name: pixi

on:
  push:
    branches:
      - main
    paths:
          - 'aic_interfaces/**'
          - 'aic_utils/**'
          - 'pixi.toml'
          - 'pixi.lock'
          - '!**/*.md'
  pull_request:
    paths:
          - 'aic_interfaces/**'
          - 'aic_utils/**'
          - 'pixi.toml'
          - 'pixi.lock'
          - '!**/*.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  pixi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          pixi-version: v0.63.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
          # Only install the default environment in CI. The `pi05` environment
          # has editable path deps to a local openpi checkout (see README TODO
          # to fork openpi) so it can't be solved on a clean CI runner.
          environments: default
          # pi05 feature's path deps cause pixi to mark the lockfile stale on
          # any host that doesn't have /home/yifeng/workspace/openpi. Disable
          # --locked until those deps are converted to a portable git ref.
          locked: false
      # only do isort check as black check is already done by other workflows
      - name: style
        run: |
          isort -c aic_utils/lerobot_robot_aic
      - name: type checks
        run: |
          pyright
