# Data collection config for CheatCodeDataCollector.
#
# 6 trials: the 3 standard evaluation scenarios repeated twice with slight
# task_board yaw variations to increase trajectory diversity.
#
# Usage (from inside the eval container):
#   ros2 launch aic_bringup aic_gz_bringup.launch.py \
#       ground_truth:=true \
#       start_aic_engine:=true \
#       aic_engine_config_file:=/home/yifeng/aic/aic_utils/sym_data/data_collection_config.yaml
#
# Then run CheatCodeDataCollector from a separate terminal:
#   pixi run ros2 run aic_model aic_model --ros-args \
#       -p use_sim_time:=true \
#       -p policy:=aic_example_policies.ros.CheatCodeDataCollector \
#       -p output_dir:=/home/yifeng/aic_data_raw

scoring:
  record_bag: false
  topics:
    - topic:
        name: "/joint_states"
        type: "sensor_msgs/msg/JointState"
    - topic:
        name: "/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/tf_static"
        type: "tf2_msgs/msg/TFMessage"
        latched: true
    - topic:
        name: "/scoring/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/aic/gazebo/contacts/off_limit"
        type: "ros_gz_interfaces/msg/Contacts"
    - topic:
        name: "/fts_broadcaster/wrench"
        type: "geometry_msgs/msg/WrenchStamped"
    - topic:
        name: "/aic_controller/joint_commands"
        type: "aic_control_interfaces/msg/JointMotionUpdate"
    - topic:
        name: "/aic_controller/pose_commands"
        type: "aic_control_interfaces/msg/MotionUpdate"
    - topic:
        name: "/scoring/insertion_event"
        type: "std_msgs/msg/String"
    - topic:
        name: "/aic_controller/controller_state"
        type: "aic_control_interfaces/msg/ControllerState"

task_board_limits:
  nic_rail:
    min_translation: -0.0215
    max_translation: 0.0234
  sc_rail:
    min_translation: -0.06
    max_translation: 0.055
  mount_rail:
    min_translation: -0.09425
    max_translation: 0.09425

