# This defines a contract to be used with https://github.com/iblnkn/rosetta.
# The contract defines the relation between ros2 topics and leRobot dataset.
name: aic_phase0
version: 1

# Robot type for LeRobot dataset metadata
robot_type: ur5e

# Recording parameters
rate_hz: 20 # This must be an integer
max_duration_s: 90.0

# Policy inference parameters # Generate 5 actions per inference (reasonable for 0.5Hz)
observations:
  - key: observation.images.wrist1
    topic: /left_camera/image
    type: sensor_msgs/msg/Image
    image:
      # bag_to_lerobot decodes to RGB and resizes here
      resize: [512, 512]
    align: { strategy: hold, stamp: header, tol_ms: 1500 }
    qos: { reliability: reliable, history: keep_last, depth: 10 }

  - key: observation.images.wrist2
    topic: /center_camera/image
    type: sensor_msgs/msg/Image
    image:
      # bag_to_lerobot decodes to RGB and resizes here
      resize: [512, 512]
    align: { strategy: hold, stamp: header, tol_ms: 1500 }
    qos: { reliability: reliable, history: keep_last, depth: 10 }

  - key: observation.images.wrist3
    topic: /right_camera/image
    type: sensor_msgs/msg/Image
    image:
      # bag_to_lerobot decodes to RGB and resizes here
      resize: [512, 512]
    align: { strategy: hold, stamp: header, tol_ms: 1500 }
    qos: { reliability: reliable, history: keep_last, depth: 10 }

  # - key: observation.images.front.depth
  #   topic: /intel_realsense_r200_depth/depth/image_raw
  #   type: sensor_msgs/msg/Image
  #   image:
  #     resize: [512, 512]
  #   align: {strategy: asof, stamp: header, tol_ms: 80}
  #   qos: {reliability: best_effort, history: keep_last, depth: 5}

  - key: observation.state
    topic: /joint_states
    type: sensor_msgs/msg/JointState
    selector:
      names:
        - position.elbow_joint
        - position.shoulder_lift_joint
        - position.shoulder_pan_joint
        - position.wrist_1_joint
        - position.wrist_2_joint
        - position.wrist_3_joint
        - velocity.elbow_joint
        - velocity.shoulder_lift_joint
        - velocity.shoulder_pan_joint
        - velocity.wrist_1_joint
        - velocity.wrist_2_joint
        - velocity.wrist_3_joint
        - effort.elbow_joint
        - effort.shoulder_lift_joint
        - effort.shoulder_pan_joint
        - effort.wrist_1_joint
        - effort.wrist_2_joint
        - effort.wrist_3_joint
    align: { strategy: hold, stamp: header, tol_ms: 1500 }
    qos: { reliability: reliable, history: keep_last, depth: 50 }

  - key: observation.state
    topic: /fts_broadcaster/wrench
    type: geometry_msgs/msg/WrenchStamped
    selector:
      names:
        - wrench.force.x
        - wrench.force.y
        - wrench.force.z
        - wrench.torque.x
        - wrench.torque.y
        - wrench.torque.z
    align: { strategy: hold, stamp: header, tol_ms: 1500 }
    qos: { reliability: reliable, history: keep_last, depth: 50 }

actions:
  - key: action
    publish:
      topic: /joint_trajectory_controller/joint_trajectory
      type: trajectory_msgs/msg/JointTrajectory
      qos: { reliability: reliable, history: keep_last, depth: 10 }
      # strategy:
      #   mode: nearest # 'fifo' | 'nearest' - nearest selects action closest to current time
      #   tolerance_ms: 500
    selector:
      names:
        - shoulder_pan_joint
        - shoulder_lift_joint
        - elbow_joint
        - wrist_1_joint
        - wrist_2_joint
        - wrist_3_joint
    safety_behavior: hold # 'zeros' to send all zeros when stopped, 'hold' to maintain last command

recording:
  storage: mcap
